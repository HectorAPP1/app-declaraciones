name: Keep PythonAnywhere webapp alive

on:
  schedule:
    # Corre el día 1 de cada mes a las 08:00 UTC
    - cron: '0 8 1 * *'
  workflow_dispatch: # Permite correrlo manualmente desde GitHub Actions

jobs:
  extend-expiry:
    runs-on: ubuntu-latest

    steps:
      - name: Reload webapp (mantiene actividad para evitar desactivación)
        run: |
          response=$(curl -s -w "\nHTTP status: %{http_code}\n" -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PYTHONANYWHERE_USERNAME }}/webapps/${{ secrets.PYTHONANYWHERE_USERNAME }}.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${{ secrets.PYTHONANYWHERE_API_TOKEN }}")
          echo "$response"
          http_status=$(echo "$response" | grep "HTTP status" | awk '{print $3}')
          if [ "$http_status" != "200" ]; then
            echo "Error: HTTP $http_status"
            exit 1
          fi
