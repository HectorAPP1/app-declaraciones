name: Keep PythonAnywhere webapp alive

on:
  schedule:
    # Corre el día 1 de cada mes a las 08:00 UTC
    - cron: '0 8 1 * *'
  workflow_dispatch: # Permite correrlo manualmente desde GitHub Actions

jobs:
  extend-expiry:
    runs-on: ubuntu-latest

    steps:
      - name: Extend webapp expiry (run until 1 month from today)
        run: |
          curl -s -f -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PYTHONANYWHERE_USERNAME }}/webapps/${{ secrets.PYTHONANYWHERE_USERNAME }}.pythonanywhere.com/extend_expiry/" \
            -H "Authorization: Token ${{ secrets.PYTHONANYWHERE_API_TOKEN }}"
